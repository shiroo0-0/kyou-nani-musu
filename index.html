<!doctype html>
<html lang="ja">
<head>
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="apple-touch-icon.png">
<meta name="theme-color" content="#BFEAFF">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>きょうなに蒸す？</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main class="app">

    <header class="header">
      <div class="logo">きょうなに蒸す？</div>

      <div class="sub">
        美容目的を選んで、今日の蒸しごはんを決めるアプリ
      </div>

      <div class="intro">
        <b>今日の蒸しごはん</b><br>
        目的を選んだあと、「今日なに蒸す？」を押すと<br>
        具材が表示されるよ！
      </div>
    </header>

    <nav class="tabs">
      <button class="tab active" data-tab="gacha">🎲 ガチャ</button>
      <button class="tab" data-tab="zukan">🥦 食材図鑑</button>
    </nav>

    <!-- ガチャ画面 -->
    <section id="gacha">
      <div class="card">

        <div class="label">今日の目的</div>
        <div class="goals" id="goalButtons"></div>

        <div class="label season-label">季節</div>

        <select class="select" id="season">
          <option value="auto">今の季節を優先</option>
          <option value="all">すべて</option>
          <option value="春">春</option>
          <option value="夏">夏</option>
          <option value="秋">秋</option>
          <option value="冬">冬</option>
          <option value="通年">通年</option>
        </select>

        <button class="dice" id="roll">
          🎲 今日なに蒸す？
        </button>

      </div>
    </section>

    <!-- 結果画面 -->
    <section id="resultPage" class="hidden">
      <div class="card result-card" id="result"></div>
    </section>

    <!-- 食材図鑑 -->
    <section id="zukan" class="hidden">

      <div class="card">
        <div class="label">食材図鑑</div>

        <select class="select" id="filterGoal">
          <option value="all">すべての目的</option>
        </select>
      </div>

      <div class="card">
        <div class="list" id="zukanList"></div>
      </div>

    </section>

  </main>

  <script src="data.js"></script>
  <script src="script.js"></script>

</body>
</html>
